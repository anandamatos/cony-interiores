services:
  db:
    image: postgres:17
    container_name: cony-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cony_db}
      POSTGRES_USER: ${POSTGRES_USER:-cony_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cony_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cony_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cony_user}:${POSTGRES_PASSWORD:-cony_password}@db:5432/${POSTGRES_DB:-cony_db}
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  storybook:
    build:
      context: ./frontend
      dockerfile: Dockerfile.storybook
    ports:
      - "6006:6006"
    environment:
      - NODE_ENV=development
    command: npm run storybook -- --no-open --host 0.0.0.0 --port 6006
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  postgres_data: