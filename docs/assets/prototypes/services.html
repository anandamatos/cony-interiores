<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cony Interiores · Serviços</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="services">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__brand">
          <div class="brand-mark">C</div>
          <div>
            <p class="eyebrow">MVP 1</p>
            <h2>Cony</h2>
          </div>
        </div>

        <div class="sidebar__section">
          <p class="sidebar__section-title">Operação</p>
          <nav class="sidebar__nav">
            <a class="nav-item" href="index.html" data-page="dashboard"><span class="nav-item__icon">⌂</span><span>Dashboard</span></a>
            <a class="nav-item active" href="services.html" data-page="services"><span class="nav-item__icon">🧵</span><span>Serviços</span></a>
            <a class="nav-item" href="tailors.html" data-page="tailors"><span class="nav-item__icon">👩‍🔧</span><span>Costureiras</span></a>
          </nav>
        </div>

        <div class="sidebar__section">
          <p class="sidebar__section-title">Depois</p>
          <nav class="sidebar__nav">
            <a class="nav-item disabled" href="#" data-page="finance" aria-disabled="true"><span class="nav-item__icon">💰</span><span>Financeiro</span></a>
            <a class="nav-item disabled" href="#" data-page="reports" aria-disabled="true"><span class="nav-item__icon">📊</span><span>Relatórios</span></a>
          </nav>
        </div>

        <div class="sidebar__footer">
          <p class="eyebrow">Usuário</p>
          <strong>Ana · Gestora</strong>
        </div>
      </aside>

      <div class="main-content">
        <header class="topbar">
          <div>
            <p class="eyebrow">MVP 1 · Fluxo operacional</p>
            <h1>Gestão de serviços</h1>
            <p class="subtitle">Cadastro, status e acompanhamento de cada pedido.</p>
          </div>
          <div class="topbar__actions">
            <a class="secondary-button" href="index.html">Voltar</a>
          </div>
        </header>

        <main class="content">
          <section class="dashboard-grid">
            <div class="panel">
              <div class="panel__header">
                <div>
                  <p class="eyebrow">Cadastro</p>
                  <h3>Novo serviço</h3>
                </div>
              </div>
              <form id="serviceForm" class="form">
                <label>Cliente<input type="text" name="client" placeholder="Nome do cliente" required /></label>
                <label>Produto<select name="product" required><option value="Cortina">Cortina</option><option value="Puff">Puff</option><option value="Jogo de Cama">Jogo de Cama</option><option value="Toalha">Toalha</option></select></label>
                <label>Quantidade<input type="number" name="quantity" min="1" value="1" required /></label>
                <label>Complexidade<select name="complexity" required><option value="P">Pequena</option><option value="M">Média</option><option value="G">Grande</option><option value="Esp">Especial</option></select></label>
                <label>Prazo<input type="date" name="deadline" required /></label>
                <label>Costureira<select name="tailor" required><option value="Sirlene">Sirlene</option><option value="Maria">Maria</option><option value="Joana">Joana</option><option value="Lúcia">Lúcia</option></select></label>
                <label>Valor (R$)<input type="number" name="value" min="0" step="0.01" value="150" required /></label>
                <button type="submit" class="primary-button">Cadastrar serviço</button>
              </form>
            </div>

            <div class="panel">
              <div class="panel__header">
                <div>
                  <p class="eyebrow">Produção</p>
                  <h3>Serviços em andamento</h3>
                </div>
              </div>
              <ul class="service-list" id="serviceList"></ul>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
