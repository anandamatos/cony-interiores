<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cony Prototype Replica</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <div class="brand-mark">CI</div>
          <div class="brand-text">
            <strong>Cony Interiores</strong>
            <span>Gestão de Produção</span>
          </div>
          <button class="sidebar-toggle" id="sidebarToggle" aria-label="Alternar menu">☰</button>
        </div>

        <nav class="sidebar-nav" id="sidebarNav"></nav>

        <div class="sidebar-footer">
          <div class="user-avatar">AN</div>
          <div class="user-meta">
            <strong>Ana Gestora</strong>
            <span>Administradora</span>
          </div>
          <button class="icon-button" aria-label="Sair">⇦</button>
        </div>
      </aside>

      <div class="main-area">
        <header class="topbar">
          <button class="icon-button mobile-menu" id="mobileMenuToggle" aria-label="Abrir menu">☰</button>
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input id="searchInput" type="search" placeholder="Buscar..." />
          </div>
          <div class="topbar-actions">
            <button class="icon-button" aria-label="Notificações">🔔<span class="notification-dot"></span></button>
            <div class="topbar-avatar">AN</div>
          </div>
        </header>

        <main class="page-content" id="pageContent"></main>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
